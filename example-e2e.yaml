driver:
  host: localhost
  port: 4444
  headless: true
  window:
    x: 0
    y: 0
    width: 1920
    height: 1080

vars:
  base_url: http://e2e-apache

scenarios:
  apache_default:
    name: Apache default page should show "It works!"
    steps:
      - !goto '{base_url}'
      - !assert_eq { kind: text, expected: 'It works!', selector: 'body' }
      - !screen_shot 'img/apache.png'
